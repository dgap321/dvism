# =============================================================================
# nginx.conf  —  DB BHISHM TABLET
# Place this at /etc/nginx/sites-available/bhishm
# =============================================================================

server {
    listen 80;
    server_name YOUR_DOMAIN_HERE;   # <-- replace with your domain

    # ── Static frontend ──────────────────────────────────────────────────
    root /var/www/bhishm/artifacts/db-editor/dist/public;
    index index.html;

    # Gzip compression for faster loads
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Long cache for hashed assets, no-cache for index.html
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # ── API proxy ─────────────────────────────────────────────────────────
    location /api {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # Increase body limit for CSV uploads
        client_max_body_size 50M;
    }

    # ── SPA fallback (all routes → index.html) ────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
